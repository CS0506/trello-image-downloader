<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <script src="https://p.trellocdn.com/power-up.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body style="padding: 10px; font-family: sans-serif; font-size: 14px;">
    <div style="margin-bottom: 10px;">
        <input type="password" id="apiKey" placeholder="Trello API Key" style="width: 100%; margin-bottom: 5px;">
        <input type="password" id="token" placeholder="Trello Token" style="width: 100%;">
        <p style="font-size: 10px; color: #666;">※KeyとTokenは一時的な利用のみで保存されません</p>
    </div>
    <button id="exec" style="padding: 10px 20px; cursor: pointer; background: #0079bf; color: white; border: none; border-radius: 3px; width: 100%;">ダウンロード開始</button>
    <div id="status" style="margin-top: 15px; white-space: pre-wrap; font-size: 12px; border-top: 1px solid #ccc; padding-top: 10px;"></div>

    <script>
        var t = TrelloPowerUp.iframe();

        document.getElementById('exec').addEventListener('click', async function() {
            const status = document.getElementById('status');
            const key = document.getElementById('apiKey').value;
            const token = document.getElementById('token').value;

            if (!key || !token) {
                status.innerText = "API Key と Token を入力してください。";
                return;
            }

            try {
                status.innerText = "解析中...";
                const card = await t.card('all');
                const attachments = card.attachments || [];

                const images = attachments.filter(a => {
                    const ext = a.name ? a.name.split('.').pop().toLowerCase() : '';
                    return ['jpg', 'jpeg', 'png', 'gif', 'webp'].includes(ext);
                });

                if (images.length === 0) {
                    status.innerText = "画像が見つかりません。";
                    return;
                }

                const zip = new JSZip();
                let downloadedCount = 0;

                for (let i = 0; i < images.length; i++) {
                    const img = images[i];
                    status.innerText = `ダウンロード中 (${i+1}/${images.length}): ${img.name}`;
                    
                    try {
                        // URLに認証情報を付加してCORSを回避する試み
                        const authUrl = `${img.url}?key=${key}&token=${token}`;
                        const response = await fetch(authUrl);
                        
                        if (!response.ok) throw new Error("認証エラー");
                        
                        const blob = await response.blob();
                        zip.file(img.name, blob);
                        downloadedCount++;
                    } catch (e) {
                        status.innerText += `\n ⚠️失敗: ${img.name} (認証情報が正しくない可能性があります)`;
                    }
                }

                if (downloadedCount === 0) {
                    status.innerText = "ファイルを1つも取得できませんでした。";
                    return;
                }

                status.innerText = "ZIPファイルを作成中...";
                const content = await zip.generateAsync({type: "blob"});
                const url = window.URL.createObjectURL(content);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${card.name || 'trello'}_images.zip`;
                a.click();
                
                status.innerText = "完了しました！";
            } catch (err) {
                status.innerText = "エラー: " + err.message;
            }
        });
    </script>
</body>
</html>
