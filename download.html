<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <script src="https://p.trellocdn.com/power-up.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 12px; color: #172b4d; }
        .input-group { margin-bottom: 8px; }
        input { width: 100%; padding: 8px; border: 1px solid #dfe1e6; border-radius: 3px; box-sizing: border-box; font-size: 12px; }
        button { width: 100%; padding: 10px; background: #0079bf; color: white; border: none; border-radius: 3px; cursor: pointer; font-weight: bold; margin-top: 5px; }
        button:hover { background: #026aa7; }
        #status-list { margin-top: 15px; border-top: 1px solid #ebecf0; padding-top: 10px; font-size: 11px; max-height: 200px; overflow-y: auto; }
        .item { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #f4f5f7; }
        .success { color: #61bd4f; }
        .error { color: #eb5a46; }
        .loader { color: #5e6c84; font-style: italic; }
    </style>
</head>
<body>
    <div id="setup-ui">
        <div class="input-group"><input type="password" id="apiKey" placeholder="Trello API Key"></div>
        <div class="input-group"><input type="password" id="token" placeholder="Trello Token"></div>
    </div>
    <button id="exec">一括ダウンロード開始</button>
    <div id="status-list"></div>

    <script>
        const t = TrelloPowerUp.iframe();
        const statusList = document.getElementById('status-list');

        // 設定の復元
        document.getElementById('apiKey').value = localStorage.getItem('trello_key') || '';
        document.getElementById('token').value = localStorage.getItem('trello_token') || '';

        function log(msg, className = '') {
            const div = document.createElement('div');
            div.className = 'item ' + className;
            div.innerHTML = `<span>${msg}</span>`;
            statusList.prepend(div);
        }

        document.getElementById('exec').addEventListener('click', async function() {
            const key = document.getElementById('apiKey').value.trim();
            const token = document.getElementById('token').value.trim();

            if (!key || !token) {
                log("API KeyとTokenを入力してください", "error");
                return;
            }

            localStorage.setItem('trello_key', key);
            localStorage.setItem('trello_token', token);
            statusList.innerHTML = ''; // クリア

            try {
                log("カード情報を読み込み中...", "loader");
                const card = await t.card('all');
                const images = (card.attachments || []).filter(a => {
                    const name = a.name ? a.name.toLowerCase() : '';
                    return name.endsWith('.jpg') || name.endsWith('.jpeg') || name.endsWith('.png') || name.endsWith('.gif') || name.endsWith('.webp');
                });

                if (images.length === 0) {
                    log("画像が見つかりませんでした", "error");
                    return;
                }

                const zip = new JSZip();
                let count = 0;

                for (const img of images) {
                    log(`${img.name} を取得中...`, "loader");
                    try {
                        // 論理的に正しいURL結合 (?があれば&、なければ?で結合)
                        const connector = img.url.includes('?') ? '&' : '?';
                        const authUrl = `${img.url}${connector}key=${key}&token=${token}`;

                        const response = await fetch(authUrl);
                        if (!response.ok) throw new Error(`HTTP ${response.status}`);
                        
                        const blob = await response.blob();
                        zip.file(img.name, blob);
                        log(`OK: ${img.name}`, "success");
                        count++;
                    } catch (e) {
                        log(`ERR: ${img.name} (${e.message})`, "error");
                    }
                }

                if (count > 0) {
                    log("ZIPファイルを生成中...", "loader");
                    const content = await zip.generateAsync({type: "blob"});
                    const a = document.createElement('a');
                    a.href = window.URL.createObjectURL(content);
                    a.download = `${card.name}_images.zip`;
                    a.click();
                    log("ダウンロード完了！", "success");
                }
            } catch (err) {
                log("致命的エラー: " + err.message, "error");
            }
        });
    </script>
</body>
</html>
