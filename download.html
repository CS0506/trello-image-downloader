<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <script src="https://p.trellocdn.com/power-up.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 15px; color: #172b4d; background: #f4f5f7; }
        .info { background: #fff9c4; padding: 10px; border-radius: 3px; font-size: 11px; margin-bottom: 10px; border: 1px solid #f2e08a; }
        input { width: 100%; padding: 8px; margin-bottom: 5px; border: 1px solid #ddd; border-radius: 3px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #5aac44; color: white; border: none; border-radius: 3px; cursor: pointer; font-weight: bold; }
        button:hover { background: #519839; }
        #status { margin-top: 10px; font-size: 11px; color: #5e6c84; }
    </style>
</head>
<body>
    <div class="info">
        ブラウザから「複数ファイルのダウンロード許可」を求められた場合は「許可」を選択してください。
    </div>
    <input type="password" id="apiKey" placeholder="Trello API Key">
    <input type="password" id="token" placeholder="Trello Token">
    <button id="exec">一斉ダウンロード開始</button>
    <div id="status"></div>

    <script>
        const t = TrelloPowerUp.iframe();
        document.getElementById('apiKey').value = localStorage.getItem('trello_key') || '';
        document.getElementById('token').value = localStorage.getItem('trello_token') || '';

        document.getElementById('exec').addEventListener('click', async function() {
            const key = document.getElementById('apiKey').value.trim();
            const token = document.getElementById('token').value.trim();
            const status = document.getElementById('status');
            
            localStorage.setItem('trello_key', key);
            localStorage.setItem('trello_token', token);

            try {
                status.innerText = "カード情報を取得中...";
                const card = await t.card('all');
                const images = (card.attachments || []).filter(a => a.name.match(/\.(jpg|jpeg|png|gif|webp)$/i));

                if (images.length === 0) {
                    status.innerText = "画像が見つかりませんでした。";
                    return;
                }

                status.innerText = `${images.length}枚の保存を順次開始します...`;

                for (let i = 0; i < images.length; i++) {
                    const img = images[i];
                    const connector = img.url.includes('?') ? '&' : '?';
                    const authUrl = `${img.url}${connector}key=${key}&token=${token}`;

                    // fetchを使わず、直接アンカータグで保存命令を出す
                    const a = document.createElement('a');
                    a.href = authUrl;
                    a.download = img.name;
                    a.target = "_blank"; // ブラウザによっては別タブで開くが、認証URLなら保存が走る
                    document.body.appendChild(a);
                    a.click();
                    
                    // ブラウザの同時実行制限を避けるため、少し間隔を空ける
                    await new Promise(resolve => setTimeout(resolve, 800));
                    document.body.removeChild(a);
                }

                status.innerText = "全画像の保存命令が完了しました。";
            } catch (err) {
                status.innerText = "エラー: " + err.message;
            }
        });
    </script>
</body>
</html>
