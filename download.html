<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <script src="https://p.trellocdn.com/power-up.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body style="padding: 10px; font-family: sans-serif;">
    <button id="exec" style="padding: 8px 16px; cursor: pointer;">ダウンロード開始</button>
    <div id="status" style="margin-top: 10px; font-size: 12px; color: #333; white-space: pre-wrap;"></div>

    <script>
        var t = TrelloPowerUp.iframe();

        document.getElementById('exec').addEventListener('click', async function() {
            const status = document.getElementById('status');
            try {
                status.style.color = "#333";
                status.innerText = "解析中...";
                
                const card = await t.card('attachments');
                const attachments = card.attachments || [];

                // 判定ロジックの強化：MIMEタイプ または 拡張子 で判定
                const images = attachments.filter(a => {
                    // 1. MIMEタイプが image/ で始まっているか
                    const hasImageMime = a.mimeType && typeof a.mimeType === 'string' && a.mimeType.startsWith('image/');
                    
                    // 2. ファイル名が画像特有の拡張子で終わっているか
                    const imageExtensions = /\.(jpe?g|png|gif|webp|bmp|svg)$/i;
                    const hasImageExt = a.name && typeof a.name === 'string' && imageExtensions.test(a.name);
                    
                    return hasImageMime || hasImageExt;
                });

                if (images.length === 0) {
                    status.innerText = `画像が見つかりません。\n(全添付ファイル数: ${attachments.length}件)\n\n※画像として認識されたファイルが0件です。`;
                    console.log("全添付ファイルデータ:", attachments);
                    return;
                }

                const zip = new JSZip();
                status.innerText = `${images.length} 枚の画像を処理します...`;

                for (let i = 0; i < images.length; i++) {
                    const img = images[i];
                    status.innerText = `取得中 (${i + 1}/${images.length}): ${img.name}`;
                    
                    const response = await fetch(img.url);
                    if (!response.ok) throw new Error(`通信エラー: ${img.name}`);
                    
                    const blob = await response.blob();
                    zip.file(img.name, blob);
                }

                status.innerText = "ZIPを作成中...";
                const content = await zip.generateAsync({type: "blob"});
                
                const url = window.URL.createObjectURL(content);
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = url;
                a.download = `${card.name || 'trello'}_images.zip`;
                document.body.appendChild(a);
                a.click();
                
                setTimeout(() => {
                    document.body.removeChild(a);
                    window.URL.revokeObjectURL(url);
                }, 100);
                
                status.innerText = "完了しました。";
            } catch (err) {
                console.error("Error:", err);
                status.style.color = "red";
                status.innerText = "エラーが発生しました:\n" + err.message;
            }
        });
    </script>
</body>
</html>
