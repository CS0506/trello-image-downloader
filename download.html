<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <script src="https://p.trellocdn.com/power-up.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body style="padding: 10px; font-family: sans-serif; font-size: 14px;">
    <div style="margin-bottom: 10px; background: #e3f2fd; padding: 10px; border-radius: 3px; font-size: 11px;">
        1. PCの時計が正確か確認してください。<br>
        2. Tokenは「承認」後に表示される英数字の羅列を入力してください。
    </div>
    <input type="password" id="apiKey" placeholder="Trello API Key" style="width: 100%; margin-bottom: 5px; padding: 5px;">
    <input type="password" id="token" placeholder="Trello Token" style="width: 100%; margin-bottom: 10px; padding: 5px;">
    
    <button id="exec" style="padding: 10px; cursor: pointer; background: #0079bf; color: white; border: none; border-radius: 3px; width: 100%;">ダウンロード開始</button>
    
    <div id="status" style="margin-top: 15px; white-space: pre-wrap; font-size: 11px; border-top: 1px solid #ccc; padding-top: 10px; color: #444;"></div>

    <script>
        var t = TrelloPowerUp.iframe();

        document.getElementById('apiKey').value = localStorage.getItem('trello_key') || '';
        document.getElementById('token').value = localStorage.getItem('trello_token') || '';

        document.getElementById('exec').addEventListener('click', async function() {
            const status = document.getElementById('status');
            const key = document.getElementById('apiKey').value.trim();
            const token = document.getElementById('token').value.trim();

            if (!key || !token) {
                status.innerText = "Error: KeyとTokenを入力してください。";
                return;
            }

            localStorage.setItem('trello_key', key);
            localStorage.setItem('trello_token', token);

            try {
                status.innerText = "カード解析中...\n";
                const card = await t.card('all');
                const attachments = card.attachments || [];

                const images = attachments.filter(a => {
                    const ext = a.name ? a.name.split('.').pop().toLowerCase() : '';
                    return ['jpg', 'jpeg', 'png', 'gif', 'webp'].includes(ext);
                });

                const zip = new JSZip();
                let successCount = 0;

                for (let i = 0; i < images.length; i++) {
                    const img = images[i];
                    status.innerText += `[${i+1}/${images.length}] ${img.name} 取得中... `;
                    
                    try {
                        // URL連結ロジックの修正
                        let authUrl = img.url;
                        authUrl += (authUrl.indexOf('?') === -1 ? '?' : '&') + `key=${key}&token=${token}`;

                        // CORS回避のためのフェッチ設定
                        const response = await fetch(authUrl, {
                            method: 'GET',
                            mode: 'cors'
                        });
                        
                        if (!response.ok) throw new Error(`HTTP ${response.status}`);
                        
                        const blob = await response.blob();
                        zip.file(img.name, blob);
                        status.innerText += "✅\n";
                        successCount++;
                    } catch (e) {
                        status.innerText += `❌ (${e.message})\n`;
                    }
                }

                if (successCount > 0) {
                    status.innerText += `\n${successCount}個のファイルをZIP化中...`;
                    const content = await zip.generateAsync({type: "blob"});
                    const url = window.URL.createObjectURL(content);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `${card.name}_images.zip`;
                    a.click();
                    status.innerText += "\n完了！";
                } else {
                    status.innerText += "\n画像を取得できませんでした。Key/TokenとPCの時刻設定を再確認してください。";
                }
            } catch (err) {
                status.innerText += "\n致命的エラー: " + err.message;
            }
        });
    </script>
</body>
</html>
