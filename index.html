<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <script src="https://p.trellocdn.com/power-up.min.js"></script>
  </head>
  <body>
    <script>
      var GRAY_ICON = 'https://trello.com/favicon.ico';

      TrelloPowerUp.initialize({
        'card-buttons': function(t, options) {
          return [{
            icon: GRAY_ICON,
            text: '画像を全保存',
            callback: function(t) {
              return t.popup({
                title: 'ダウンロード準備',
                url: './download.html'
              });
            }
          }];
        }
      });
    </script>
  </body>
</html>
